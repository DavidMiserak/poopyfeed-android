# SonarQube Configuration for PoopyFeed Android
sonar.projectKey=poopyfeed-android
sonar.projectName=PoopyFeed Android
sonar.projectVersion=1.0

# Base path (Gradle project is under poopyfeed/)
sonar.projectBaseDir=poopyfeed

# Source code location
sonar.sources=app/src/main/java
sonar.tests=app/src/test/java

# Exclusions (generated code, DI modules, build config)
sonar.exclusions=**/di/**,**/BuildConfig.*,**/R.class,**/R$*.class

# Test file patterns
sonar.test.inclusions=**/*Test.kt

# Coverage report (Kover JaCoCo-XML)
sonar.coverage.jacoco.xmlReportPaths=app/build/reports/kover/report.xml

# Language encoding
sonar.sourceEncoding=UTF-8

# Ignore kotlin:S117 (variable naming conventions)
# S117 flags snake_case parameters intentionally used for API field mapping
sonar.issue.ignore.multicriteria=s117
sonar.issue.ignore.multicriteria.s117.ruleKey=kotlin:S117
sonar.issue.ignore.multicriteria.s117.resourceKey=**
